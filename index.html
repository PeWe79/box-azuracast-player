<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- ./primary meta tags -->
    <title>Radio Player</title>
    <meta name="title" content="Radio Player">

    <!-- ./favicon -->
    <link rel="shortcut icon" href="./favicon.svg" type="image/svg+xml">
    
    <!-- ./google font link -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&display=swap" rel="stylesheet">
    
    <!-- ./material icon font -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,-25" />
    
    <!-- ./custom css link -->
    <link rel="stylesheet" href="./static/css/style.css">
  </head>
  <body>
    <!-- ./app bar -->
    <div class="top-bar wrapper">
      <div class="logo wrapper">
        <span class="material-symbols-rounded">graphic_eq</span>
        <h1 class="title-lg">Radio Player</h1>
      </div>
      <div class="top-bar-actions">
        <button class="btn-icon" data-playlist-toggler>
          <span class="material-symbols-rounded">expand_more</span>
        </button>
      </div>
    </div>
    <main>
      <article>
        <!-- ./player -->
        <div class="player">
          <div class="container">
            <figure class="music-banner">
              <img id="artwork" src="./static/images/misc/boxradio.png" width="800" height="800" alt="Loading..." class="img-cover" data-player-banner>
            </figure>
            <div class="music-content">
              <h2 id="text" class="headline-sm" data-title>Loading....</h2>
              <p class="label-lg label-wrapper wrapper">
                <span id="album" data-album>Loading...</span>
                <span id="duration" data-year></span>
              </p>
              <p id="artist" class="label-md artist" data-artist>Loading...</p>
              <div class="seek-control">
                <div>
                  <div class="range-wrapper">
                    <input type="range" step="1" max="60" value="0" class="range" data-range data-seek>
                    <div class="range-fill" data-range-fill></div>
                  </div>
                  <div class="duration-label wrapper">
                    <span class="label-md" data-running-time>0:00</span>
                    <span id="d-duration" class="label-md" data-duration>1:00</span>
                  </div>
                </div>
                <div class="volume">
                  <button class="btn-icon" data-volume-btn>
                    <span class="material-symbols-rounded">volume_up</span>
                  </button>
                  <div class="range-wrapper">
                    <input type="range" step="0.05" max="1" value="1" class="range" data-range data-volume>
                    <div class="range-fill" data-range-fill></div>
                  </div>
                </div>
              </div>
              <div class="player-control wrapper">
                <button class="btn-icon" data-repeat>
                  <a id="spotify" href="https://open.spotify.com" target="_blank" rel="noopener noreferrer">
                    <img id="s_logo" src="./static/images/misc/spotify.png" width="50" height="60">
                  </a>
                </button>
                <button class="btn-icon" data-skip-prev>
                  <span class="material-symbols-rounded">skip_previous</span>
                </button>
                <button class="btn-icon play" data-play-btn>
                  <span class="material-symbols-rounded default-icon">play_arrow</span>
                  <span class="material-symbols-rounded active-icon">stop</span>
                </button>
                <button class="btn-icon" data-skip-next>
                  <span class="material-symbols-rounded">skip_next</span>
                </button>
                <button id="HistoryModalBtn" class="btn-icon" data-history>
                  <span class="material-symbols-rounded">history</span>
                </button>
              </div>
            </div>
          </div>
        </div>
        <!-- ./playlist -->
        <div class="playlist" data-playlist>
          <ul class="music-list" data-music-list></ul>
        </div>
        <div class="overlay" data-playlist-toggler data-overlay></div>
      </article>
    </main>

    <div id="modal" class="fixed z-10 inset-0 overflow-y-auto hidden">
      <div class="flex items-center justify-center min-h-screen px-4 pt-4 pb-20 text-center sm:block sm:p-0">
        <div class="fixed inset-0 transition-opacity" aria-hidden="true">
          <div class="absolute inset-0 bg-black opacity-70"></div>
        </div>
        <span class="hidden sm:inline-block sm:align-middle sm:h-screen" aria-hidden="true">&#8203;</span>
        <div
          class="inline-block align-bottom bg-white rounded-lg text-left overflow-hidden shadow-xl transform transition-all sm:my-8 sm:align-middle sm:max-w-5xl sm:w-full">
          <div class="bg-white px-4 pt-5 pb-4 sm:p-6 sm:pb-4 relative">
            <button type="button" id="closeModal"
              class="absolute top-3 right-3 text-gray-400 hover:text-gray-500 focus:outline-none">
              <svg class="h-6 w-6" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
                stroke="currentColor" aria-hidden="true">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
              </svg>
            </button>
            <div class="sm:flex sm:items-start">
              <div class="mt-3 text-center sm:mt-0 sm:ml-4 sm:text-left">
                <h3 class="text-lg leading-6 font-medium text-gray-900" id="modal-headline"></h3>
                <div class="mt-2">
                  <div class="flex flex-col mt-4 items-center"></div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div id="errorModal" class="fixed z-10 inset-0 overflow-y-auto hidden">
      <div class="flex items-center justify-center min-h-screen px-4 pt-4 pb-20 text-center sm:block sm:p-0">
        <div class="fixed inset-0 transition-opacity" aria-hidden="true">
          <div class="absolute inset-0 bg-black opacity-70"></div>
        </div>
        <span class="hidden sm:inline-block sm:align-middle sm:h-screen" aria-hidden="true">&#8203;</span>
        <div
          class="inline-block align-bottom bg-white rounded-lg text-left overflow-hidden shadow-xl transform transition-all sm:my-8 sm:align-middle sm:max-w-md sm:w-full">
          <div class="bg-white px-4 pt-5 pb-4 sm:p-6 sm:pb-4 relative">
            <div class="mt-2 text-center">
              <p class="text-white">Data Failed to Load, Please retry</p>
            </div>
            <div class="mt-4">
              <button id="retryButton" class="w-full border text-white px-4 py-2 rounded hover:text-white transition">
                Reload
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div id="historyModal" class="fixed z-10 inset-0 overflow-y-auto hidden">
      <div class="flex items-center justify-center min-h-screen px-4 pt-4 pb-20 text-center sm:block sm:p-0">
        <div class="fixed inset-0 transition-opacity" aria-hidden="true">
          <div class="absolute inset-0 bg-black opacity-70"></div>
        </div>
        <span class="hidden sm:inline-block sm:align-middle sm:h-screen" aria-hidden="true">&#8203;</span>
        <div
          class="inline-block align-bottom bg-white rounded-lg text-left overflow-hidden shadow-xl transform transition-all sm:my-8 sm:align-middle sm:max-w-6xl sm:w-full"
          role="dialog" aria-modal="true" aria-labelledby="modal-headline">
          <div class="bg-white px-4 pt-5 pb-4 sm:p-6 sm:pb-4 relative" id="historyModalContent">
            <button type="button" id="closeHistoryModal"
              class="absolute top-3 right-3 text-gray-400 hover:text-gray-500 focus:outline-none">
              <svg class="h-6 w-6" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
                stroke="currentColor" aria-hidden="true">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
              </svg>
            </button>
            <div class="mt-3 text-center sm:mt-0 sm:ml-4 sm:text-center">
              <h3 class="text-lg leading-6 font-bold text-gray-900" id="modal-headline"></h3>
              <div class="mt-4">
                <span class="text-4xl font-bold text-white">Recent Song</span>
                <ul id="song-history-list" class="divide-y divide-gray-200"></ul>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- ./javascipt -->
     <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
     <script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.2/anime.min.js"></script>
     <script src="//cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script src="./static/js/script.js"></script>
    </body>
</html>
